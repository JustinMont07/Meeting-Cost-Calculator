<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contact Us — Meeting Cost Calculator</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Source+Sans+3:wght@400;600&display=swap" rel="stylesheet"/>
  <link href="styles.css" rel="stylesheet"/>
  <script>
    const t = localStorage.getItem('theme');
    if (t) document.documentElement.setAttribute('data-theme', t);
  </script>
</head>

<body class="content-layout">

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="shared.js"></script>
  <script src="navbar.js"></script>

  <div class="content-page">

    <header class="content-page-header">
      <h1 class="header londrina-shadow-regular">Contact Us</h1>
      <p class="header">We would love to hear from you.</p>
    </header>

    <div class="content-page-body">

      <div class="content-section">
        <h2 class="subheader">Get in touch</h2>
        <p class="description">
          Have a feature request, found a bug, or just want to share how
          you are using this tool? Fill out the form below and we will get
          back to you as soon as we can.
        </p>
      </div>

      <!-- Contact form -->
      <div class="card contact-card">
        <div class="card-body">

          <div class="mb-3">
            <label class="form-label description" for="contact-name">Name</label>
            <input type="text" class="form-control" id="contact-name" placeholder="Your name" />
          </div>

          <div class="mb-3">
            <label class="form-label description" for="contact-email">Email</label>
            <input type="email" class="form-control" id="contact-email" placeholder="you@example.com" />
          </div>

          <div class="mb-3">
            <label class="form-label description" for="contact-subject">Subject</label>
            <select class="form-select" id="contact-subject">
              <option value="" disabled selected>Select a topic</option>
              <option value="bug">Bug report</option>
              <option value="feature">Feature request</option>
              <option value="feedback">General feedback</option>
              <option value="other">Other</option>
            </select>
          </div>

          <div class="mb-4">
            <label class="form-label description" for="contact-message">Message</label>
            <textarea class="form-control" id="contact-message" rows="5"
              placeholder="Tell us what's on your mind..."></textarea>
          </div>

          <button class="btn btn-primary w-100" onclick="submitContact()">Send Message</button>

          <!-- Confirmation message — hidden until form is submitted -->
          <div id="contact-confirmation" class="contact-confirmation" style="display:none;">
            <span class="contact-confirmation-icon">✓</span>
            <p class="description mb-0">
              Thanks for reaching out! We will be in touch soon.
            </p>
          </div>

        </div>
      </div>

    </div>
  </div>

  <script>
    // -------------------------------------------------------
    // submitContact()
    // Basic client-side validation, then shows a confirmation.
    // Wire up to a real backend or email service as needed.
    // -------------------------------------------------------
    function submitContact() {
      const name    = document.getElementById('contact-name').value.trim();
      const email   = document.getElementById('contact-email').value.trim();
      const subject = document.getElementById('contact-subject').value;
      const message = document.getElementById('contact-message').value.trim();

      if (!name || !email || !subject || !message) {
        alert('Please fill in all fields before sending.');
        return;
      }

      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      if (!emailRegex.test(email)) {
        alert('Please enter a valid email address.');
        return;
      }

      // TODO: replace with real form submission (e.g. fetch to an API endpoint)
      console.log('Contact form submitted:', { name, email, subject, message });

      // Hide the form fields and show confirmation
      document.querySelector('.contact-card .card-body').querySelectorAll(
        '.mb-3, .mb-4, .btn-primary'
      ).forEach(el => el.style.display = 'none');

      document.getElementById('contact-confirmation').style.display = 'flex';
    }
  </script>

</body>
</html>
