<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>People — Meeting Cost Calculator</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Source+Sans+3:wght@400;600&display=swap" rel="stylesheet"/>
  <link href="styles.css" rel="stylesheet"/>
  <script>
    // Apply saved theme before render to prevent flash of wrong theme
    const t = localStorage.getItem('theme');
    if (t) document.documentElement.setAttribute('data-theme', t);
  </script>
</head>

<body class="content-layout">


  <div class="people-page-wrapper">
  <div class="container" style="max-width: 600px;">

    <h1 class="header londrina-shadow-regular mb-1">Meeting Cost Calculator</h1>
    <p class="header mb-4">Add everyone attending meetings.</p>

    <!-- ===================== PERSON FORM =====================
         Person cards are dynamically inserted here by persons.js.
         Each card has a name and salary field.
    ========================================================= -->
    <div id="people-container"></div>

    <!-- Appends a new blank person card -->
    <button class="btn btn-outline-primary w-100 mb-3" onclick="addPerson()">
      + Add Another Person
    </button>

    <!-- Validates fields, saves to localStorage, navigates to breakdown.html -->
    <button class="btn btn-primary w-100 mb-2" onclick="submitForm()">
      Save &amp; Continue &rarr;
    </button>

    <!-- Clears all data after confirmation -->
    <button class="btn btn-outline-secondary w-100" onclick="resetForm()">
      Start Over
    </button>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="shared.js"></script>
  <script src="navbar.js"></script>
  <script src="persons.js"></script>
</body>
</html>
