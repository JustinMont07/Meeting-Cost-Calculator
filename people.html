<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>People — Meeting Cost Calculator</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Source+Sans+3:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <link href="styles.css" rel="stylesheet" />
    <script>
      const t = localStorage.getItem("theme");
      if (t) document.documentElement.setAttribute("data-theme", t);
    </script>
  </head>

  <body class="content-layout">
    <div class="people-page-header">
      <h1 class="header londrina-shadow-regular mb-1">
        Meeting Cost Calculator
      </h1>
      <p class="header mb-0">Add everyone attending meetings.</p>
    </div>

    <div class="people-split-layout">
      <!-- ============ LEFT — Add Attendee form ============ -->
      <div class="people-left-panel">
        <div class="card add-person-card mb-3">
          <div class="card-body">
            <h5 class="subheader mb-3">Add Attendee</h5>

            <div class="mb-3">
              <label class="form-label description" for="add-name">Name</label>
              <input
                type="text"
                class="form-control"
                id="add-name"
                placeholder="Full name"
                onkeydown="if (event.key === 'Enter') addPersonFromForm();"
                oninput="this.classList.remove('is-invalid')"
              />
              <div class="invalid-feedback">Please enter a name.</div>
            </div>

            <div class="mb-3">
              <label
                class="form-label description"
                id="add-salary-label"
                for="add-salary"
                >Annual Salary ($)</label
              >
              <input
                type="text"
                class="form-control"
                id="add-salary"
                placeholder="$0"
                data-raw-value=""
                oninput="formatSalaryInput(this)"
                onkeydown="if (event.key === 'Enter') addPersonFromForm();"
              />
              <div class="invalid-feedback">Please enter a salary.</div>
              <div class="salary-type-btns btn-group btn-group-sm mt-2 w-100">
                <input
                  type="radio"
                  class="btn-check"
                  name="add-salaryType"
                  id="add-annual"
                  value="annual"
                  checked
                  onchange="updateAddFormLabels('annual')"
                />
                <label class="btn btn-outline-primary" for="add-annual"
                  >Annual</label
                >
                <input
                  type="radio"
                  class="btn-check"
                  name="add-salaryType"
                  id="add-hourly"
                  value="hourly"
                  onchange="updateAddFormLabels('hourly')"
                />
                <label class="btn btn-outline-primary" for="add-hourly"
                  >Hourly</label
                >
              </div>
            </div>

            <button
              class="btn btn-outline-primary w-100"
              onclick="addPersonFromForm()"
            >
              + Add Attendee
            </button>
          </div>
        </div>

        <button class="btn btn-primary w-100 mb-2" onclick="submitForm()">
          Save &amp; Continue &rarr;
        </button>
        <button class="btn btn-outline-secondary w-100" onclick="resetForm()">
          Start Over
        </button>
      </div>

      <!-- ============ RIGHT — Attendees list ============ -->
      <div class="people-right-panel">
        <div class="people-list-card card">
          <div class="card-body p-0">
            <div class="people-list-header">
              <span class="subheader">Attendees</span>
              <span class="people-count-badge" id="people-count-badge"></span>
            </div>

            <div id="people-list-empty" class="people-list-empty">
              No attendees yet — add one using the form.
            </div>

            <div id="people-list"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- ===================== EDIT PERSON MODAL ===================== -->
    <div
      class="modal fade"
      id="editPersonModal"
      tabindex="-1"
      aria-labelledby="editPersonModalLabel"
      aria-hidden="true"
    >
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content edit-modal-content">
          <div class="modal-header edit-modal-header">
            <h5 class="modal-title subheader mb-0" id="editPersonModalLabel">
              Edit Attendee
            </h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>
          <div class="modal-body">
            <input type="hidden" id="edit-person-index" />
            <div class="row g-3">
              <div class="col-sm-6">
                <label class="form-label description" for="edit-person-name"
                  >Name</label
                >
                <input
                  type="text"
                  class="form-control"
                  id="edit-person-name"
                  placeholder="Full name"
                  oninput="this.classList.remove('is-invalid')"
                  onkeydown="if (event.key === 'Enter') saveEditPerson();"
                />
                <div class="invalid-feedback">Please enter a name.</div>
              </div>
              <div class="col-sm-6">
                <label
                  class="form-label description"
                  id="edit-salary-label"
                  for="edit-person-salary"
                  >Annual Salary ($)</label
                >
                <input
                  type="text"
                  class="form-control"
                  id="edit-person-salary"
                  placeholder="$0"
                  data-raw-value=""
                  oninput="formatSalaryInput(this)"
                  onkeydown="if (event.key === 'Enter') saveEditPerson();"
                />
                <div class="invalid-feedback">Please enter a salary.</div>
                <div class="salary-type-btns btn-group btn-group-sm mt-2 w-100">
                  <input
                    type="radio"
                    class="btn-check"
                    name="edit-salaryType"
                    id="edit-annual"
                    value="annual"
                    checked
                    onchange="updateEditFormLabels('annual')"
                  />
                  <label class="btn btn-outline-primary" for="edit-annual"
                    >Annual</label
                  >
                  <input
                    type="radio"
                    class="btn-check"
                    name="edit-salaryType"
                    id="edit-hourly"
                    value="hourly"
                    onchange="updateEditFormLabels('hourly')"
                  />
                  <label class="btn btn-outline-primary" for="edit-hourly"
                    >Hourly</label
                  >
                </div>
              </div>
            </div>
          </div>
          <div class="modal-footer edit-modal-footer">
            <button
              type="button"
              class="btn btn-outline-secondary"
              data-bs-dismiss="modal"
            >
              Cancel
            </button>
            <button
              type="button"
              class="btn btn-primary"
              onclick="saveEditPerson()"
            >
              Save Changes
            </button>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="shared.js"></script>
    <script src="navbar.js"></script>
    <script src="persons.js"></script>
    <script src="footer.js"></script>
  </body>
</html>
